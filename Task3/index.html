<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img class="logo" src="logo.png" alt="header-logo">
    </header>

    <main>
        <form  action="">
            <section class="undertaken-area">
                <h2 class="main-heading">Submission</h2>
                
                <div class="div">
                    <label class="undertaken" for="undertaken">All details of submissions will be kept strictly private and confidential by Mailman and will not be used for any purpose other than judging Red Card 2918 winners.</label>
                    <button class=" plus checkbox">+</button>
                </div>

                <div class="div">
                    <label class="deadline" for="deadline">Applications will close on the 15th December 2017</label>
                    <button class=" plus second checkbox">+</button>
                </div>
                
            </section>

            <section class="input-area">

                <section class="person-details">

                    <input type="text" name="name" class="input-box" placeholder="Name" required>

                    <input type="email" name="email" class="input-box" placeholder="Email Address" required>

                    <input type="text" name="organization" class="input-box" placeholder="Organization" required>

                </section>

                <section class="checkbox-area">

                    <h2>Which Award</h2>
                    <p>(Please tick and provide details for all of the awards you would like to be nominated for)</p>

                    <article>

                        <div class="upper-check">
                            <div class="upper">
                                <input type="checkbox" class="input" id="livestream" name="livestream">

                                <label for="livestream">Best Livestream</label>
                            </div>
                            
                            <button class=" plus checkbox">+</button>
                        </div>
                        

                        <div>
                            <textarea name="description" class="description" id="description" placeholder="Description & Results (max, 150 words)"></textarea>
                        </div>

                    </article>
                    
                    <article>

                        <div class="upper-check">
                            <div class="upper">
                                <input type="checkbox" class="input" id="campaign" name="campaign">

                                <label for="campaign">Best Tour Campaign</label>
                            </div>
                            <button class="checkbox plus">+</button>
                        </div>
                        

                        <div>
                            <textarea class="description" class="description" name="description" id="description" placeholder="Description & Results (max, 150 words)"></textarea>
                        </div>

                    </article>

                    <article>

                        <div class="upper-check">
                            <div class="upper">
                                <input type="checkbox" class="input" id="activation" name="activation">

                                <label for="activation">Best Sponsor Activation</label>
                            </div>

                            <button class="plus checkbox">+</button>
                        </div>
                        

                        <div>
                            <textarea name="description" class="description" id="description" placeholder="Description & Results (max, 150 words)"></textarea>
                        </div>

                    </article>

                    <article>

                        <div class="upper-check">
                            <div class="upper">
                                <input type="checkbox" class="input" id="technology" name="technology">

                                <label for="technology">Best Use of Technology</label>
                            </div>

                            <button class="plus checkbox">+</button>
                        </div>
                        

                        <div>
                            <textarea name="description" class="description" id="description" placeholder="Description & Results (max, 150 words)"></textarea>
                        </div>

                    </article>

                    <article>

                        <div class="upper-check">
                            <div class="upper">
                                <input type="checkbox" class="input" id="oCampaign" name="oCampaign">

                                <label for="oCampaign">Best Online Campaign</label>
                            </div>

                            <button class="checkbox plus">+</button>
                        </div>

                        <div>
                            <textarea name="description" class="description" id="description" placeholder="Description & Results (max, 150 words)"></textarea>
                        </div>

                    </article>

                </section>

                <button class="submit-button">  Submission Successful</button>

            </section>

            <!-- <div class="last-div">
                <img class="image" src="icon_awards(1).png" alt="icon-bottom">
            </div> -->
            
        </form>
    </main>
</body>
</html>
